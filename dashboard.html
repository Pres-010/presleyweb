<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS — Message Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink:    #0d0d0d;
      --paper:  #f5f0e8;
      --warm:   #e8e0d0;
      --accent: #c8410a;
      --sage:   #1a6b4a;
      --muted:  #7a7060;
      --line:   rgba(245, 240, 232, 0.1);
      --serif:  'DM Serif Display', Georgia, serif;
      --mono:   'DM Mono', monospace;
      --sans:   'Syne', sans-serif;
    }

    html { height: 100%; }

    body {
      background: var(--ink);
      color: var(--paper);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 2.5rem;
      border-bottom: 1px solid var(--line);
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-brand h1 {
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--paper);
    }

    .header-brand h1 span { color: var(--accent); }

    .header-tag {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid rgba(245,240,232,0.15);
      padding: 0.2rem 0.6rem;
      border-radius: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .unread-badge {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      background: var(--accent);
      color: #fff;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      display: none;
    }

    .unread-badge.visible { display: inline-block; }

    .header-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid rgba(245,240,232,0.2);
      color: var(--muted);
      padding: 0.45rem 1rem;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
    }

    .header-btn:hover { border-color: var(--paper); color: var(--paper); }
    .header-btn.danger { border-color: rgba(200,65,10,0.4); color: var(--accent); }
    .header-btn.danger:hover { background: rgba(200,65,10,0.08); }

    /* ── LAYOUT ── */
    .shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-toolbar {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    .search-box {
      background: rgba(245,240,232,0.05);
      border: 1px solid rgba(245,240,232,0.1);
      border-radius: 2px;
      padding: 0.55rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--paper);
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .search-box::placeholder { color: var(--muted); }
    .search-box:focus { border-color: rgba(200,65,10,0.4); }

    .filter-tabs {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .filter-tab {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.25rem 0.65rem;
      border: 1px solid rgba(245,240,232,0.12);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.18s;
    }

    .filter-tab:hover { border-color: rgba(245,240,232,0.3); color: var(--paper); }
    .filter-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .msg-list {
      overflow-y: auto;
      flex: 1;
    }

    .msg-list::-webkit-scrollbar { width: 4px; }
    .msg-list::-webkit-scrollbar-track { background: transparent; }
    .msg-list::-webkit-scrollbar-thumb { background: rgba(245,240,232,0.1); border-radius: 2px; }

    .msg-item {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .msg-item:hover { background: rgba(245,240,232,0.03); }
    .msg-item.active { background: rgba(200,65,10,0.07); border-left: 2px solid var(--accent); }
    .msg-item.unread { border-left: 2px solid rgba(200,65,10,0.5); }
    .msg-item.unread .msg-name { color: var(--paper); }

    .msg-item-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.2rem;
    }

    .msg-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(245,240,232,0.7);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .msg-time {
      font-size: 0.6rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .msg-email {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-preview {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg-status-dot {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .dot-new      { background: var(--accent); }
    .dot-read     { background: var(--muted); }
    .dot-replied  { background: var(--sage); }
    .dot-archived { background: rgba(245,240,232,0.2); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0.8rem;
      padding: 2rem;
      text-align: center;
    }

    .empty-state .empty-icon {
      font-size: 2rem;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── DETAIL PANE ── */
    .detail {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .detail-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
    }

    .detail-placeholder .ph-icon {
      font-family: var(--serif);
      font-size: 5rem;
      color: rgba(245,240,232,0.04);
      line-height: 1;
    }

    .detail-placeholder p {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }

    .detail-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }

    .detail-from h2 {
      font-family: var(--serif);
      font-size: 1.5rem;
      color: var(--paper);
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .detail-from p {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .detail-actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .action-btn {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 0.9rem;
      border-radius: 2px;
      border: 1px solid rgba(245,240,232,0.15);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.18s;
    }

    .action-btn:hover { border-color: rgba(245,240,232,0.35); color: var(--paper); }
    .action-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .action-btn.primary:hover { background: #a8340a; }
    .action-btn.success { background: var(--sage); border-color: var(--sage); color: #fff; }
    .action-btn.del { border-color: rgba(200,65,10,0.3); color: var(--accent); }
    .action-btn.del:hover { background: rgba(200,65,10,0.08); }

    .status-select {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 0.7rem;
      border-radius: 2px;
      border: 1px solid rgba(245,240,232,0.15);
      background: rgba(245,240,232,0.05);
      color: var(--paper);
      cursor: pointer;
      outline: none;
    }

    .status-select:focus { border-color: rgba(200,65,10,0.4); }
    .status-select option { background: #1a1612; color: var(--paper); }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .detail-body::-webkit-scrollbar { width: 4px; }
    .detail-body::-webkit-scrollbar-track { background: transparent; }
    .detail-body::-webkit-scrollbar-thumb { background: rgba(245,240,232,0.1); border-radius: 2px; }

    .msg-text {
      font-size: 0.92rem;
      color: rgba(245,240,232,0.8);
      line-height: 1.85;
      white-space: pre-wrap;
      border-left: 2px solid rgba(200,65,10,0.3);
      padding-left: 1.2rem;
    }

    .note-section h4 {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .note-textarea {
      width: 100%;
      background: rgba(245,240,232,0.04);
      border: 1px solid rgba(245,240,232,0.1);
      border-radius: 2px;
      padding: 0.8rem 1rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--paper);
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color 0.2s;
    }

    .note-textarea::placeholder { color: var(--muted); }
    .note-textarea:focus { border-color: rgba(200,65,10,0.4); }

    .note-save-btn {
      margin-top: 0.6rem;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.45rem 1rem;
      border-radius: 2px;
      border: 1px solid rgba(245,240,232,0.15);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: all 0.18s;
    }

    .note-save-btn:hover { border-color: var(--sage); color: var(--sage); }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 2rem;
      padding: 0.6rem 2.5rem;
      border-bottom: 1px solid var(--line);
      background: rgba(245,240,232,0.02);
      flex-shrink: 0;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
    }

    .stat-val {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--accent);
    }

    .stat-lbl {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--sage);
      color: #fff;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.65rem 1.2rem;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      pointer-events: none;
      z-index: 9999;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 760px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { max-height: 40vh; }
      header { padding: 1rem 1.2rem; }
      .stats-bar { padding: 0.6rem 1.2rem; gap: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header>
    <div class="header-brand">
      <h1>John<span>.</span>Doe <span style="font-weight:400;opacity:0.4;">/ CMS</span></h1>
      <span class="header-tag">Dashboard</span>
    </div>
    <div class="header-right">
      <span class="unread-badge" id="unreadBadge">0 new</span>
      <button class="header-btn" id="refreshBtn">↺ Refresh</button>
      <button class="header-btn danger" id="clearAllBtn">Clear all</button>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-val" id="statTotal">0</span>
      <span class="stat-lbl">Total</span>
    </div>
    <div class="stat-item">
      <span class="stat-val" id="statNew">0</span>
      <span class="stat-lbl">Unread</span>
    </div>
    <div class="stat-item">
      <span class="stat-val" id="statReplied">0</span>
      <span class="stat-lbl">Replied</span>
    </div>
    <div class="stat-item">
      <span class="stat-val" id="statArchived">0</span>
      <span class="stat-lbl">Archived</span>
    </div>
  </div>

  <!-- SHELL -->
  <div class="shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-toolbar">
        <input class="search-box" id="searchBox" type="text" placeholder="Search messages…" />
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" data-filter="all">All</button>
          <button class="filter-tab" data-filter="new">New</button>
          <button class="filter-tab" data-filter="read">Read</button>
          <button class="filter-tab" data-filter="replied">Replied</button>
          <button class="filter-tab" data-filter="archived">Archived</button>
        </div>
      </div>
      <div class="msg-list" id="msgList"></div>
    </aside>

    <!-- DETAIL -->
    <section class="detail" id="detailPane">
      <div class="detail-placeholder" id="detailPlaceholder">
        <div class="ph-icon">✉</div>
        <p>Select a message to read it</p>
      </div>
    </section>

  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'cms_messages';
    let state = { messages: [], filter: 'all', search: '', selected: null };

    /* ── STORAGE ── */
    function loadMessages() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }

    function saveMessages() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.messages));
    }

    /* ── HELPERS ── */
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtTime(ts) {
      const diff = Date.now() - ts;
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return Math.round(diff / 60000) + 'm ago';
      if (diff < 86400000) return Math.round(diff / 3600000) + 'h ago';
      const d = new Date(ts);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function statusLabel(s) {
      return { new: 'New', read: 'Read', replied: 'Replied', archived: 'Archived' }[s] || s;
    }

    function showToast(msg, color) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = color || 'var(--sage)';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    /* ── STATS ── */
    function renderStats() {
      const msgs = state.messages;
      document.getElementById('statTotal').textContent    = msgs.length;
      document.getElementById('statNew').textContent      = msgs.filter(m => m.status === 'new').length;
      document.getElementById('statReplied').textContent  = msgs.filter(m => m.status === 'replied').length;
      document.getElementById('statArchived').textContent = msgs.filter(m => m.status === 'archived').length;

      const unread = msgs.filter(m => m.status === 'new').length;
      const badge  = document.getElementById('unreadBadge');
      if (unread > 0) { badge.textContent = unread + ' new'; badge.classList.add('visible'); }
      else badge.classList.remove('visible');
    }

    /* ── SIDEBAR LIST ── */
    function filteredMessages() {
      return state.messages.filter(m => {
        if (state.filter !== 'all' && m.status !== state.filter) return false;
        if (state.search) {
          const q = state.search.toLowerCase();
          return m.name.toLowerCase().includes(q)
              || m.email.toLowerCase().includes(q)
              || m.message.toLowerCase().includes(q);
        }
        return true;
      });
    }

    function renderList() {
      const list  = document.getElementById('msgList');
      const items = filteredMessages();

      if (items.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <div class="empty-icon">✉</div>
          <p>${state.messages.length === 0
            ? 'No messages yet.<br>Submit the contact form on your portfolio.'
            : 'No messages match your filter.'}</p>
        </div>`;
        return;
      }

      list.innerHTML = items.map(m => `
        <div class="msg-item ${m.status === 'new' ? 'unread' : ''} ${m.id === state.selected ? 'active' : ''}"
             data-id="${m.id}">
          <div class="msg-item-top">
            <span class="msg-name">
              <span class="msg-status-dot dot-${m.status}"></span>${esc(m.name)}
            </span>
            <span class="msg-time">${fmtTime(m.ts)}</span>
          </div>
          <div class="msg-email">${esc(m.email)}</div>
          <div class="msg-preview">${esc(m.message)}</div>
        </div>
      `).join('');

      list.querySelectorAll('.msg-item').forEach(el => {
        el.addEventListener('click', () => openMessage(el.dataset.id));
      });
    }

    /* ── DETAIL PANE ── */
    function renderDetail() {
      const pane = document.getElementById('detailPane');

      if (!state.selected) {
        pane.innerHTML = `<div class="detail-placeholder" id="detailPlaceholder">
          <div class="ph-icon">✉</div>
          <p>Select a message to read it</p>
        </div>`;
        return;
      }

      const msg = state.messages.find(m => m.id === state.selected);
      if (!msg) { state.selected = null; renderDetail(); return; }

      const otherStatuses = ['new','read','replied','archived'].filter(s => s !== msg.status);

      pane.innerHTML = `
        <div class="detail-header">
          <div class="detail-from">
            <h2>${esc(msg.name)}</h2>
            <p>${esc(msg.email)} &middot; ${fmtTime(msg.ts)}</p>
          </div>
          <div class="detail-actions">
            <select class="status-select" id="statusSelect">
              ${['new','read','replied','archived'].map(s =>
                `<option value="${s}"${msg.status===s?' selected':''}>${statusLabel(s)}</option>`
              ).join('')}
            </select>
            <button class="action-btn primary" id="copyEmailBtn">Copy email</button>
            <button class="action-btn del" id="deleteBtn">Delete</button>
          </div>
        </div>
        <div class="detail-body">
          <div class="msg-text">${esc(msg.message)}</div>
          <div class="note-section">
            <h4>Private note</h4>
            <textarea class="note-textarea" id="noteTextarea" placeholder="Add a private note…">${esc(msg.note || '')}</textarea>
            <button class="note-save-btn" id="saveNoteBtn">Save note</button>
          </div>
        </div>`;

      document.getElementById('statusSelect').addEventListener('change', function () {
        updateStatus(msg.id, this.value);
      });

      document.getElementById('copyEmailBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(msg.email).then(() => showToast('Email copied!'));
      });

      document.getElementById('deleteBtn').addEventListener('click', () => {
        if (!confirm('Delete this message?')) return;
        state.messages = state.messages.filter(m => m.id !== msg.id);
        state.selected = null;
        saveMessages();
        renderAll();
        showToast('Message deleted', 'var(--accent)');
      });

      document.getElementById('saveNoteBtn').addEventListener('click', () => {
        const note = document.getElementById('noteTextarea').value;
        const m = state.messages.find(x => x.id === msg.id);
        if (m) { m.note = note; saveMessages(); showToast('Note saved'); }
      });
    }

    function renderAll() {
      renderStats();
      renderList();
      renderDetail();
    }

    /* ── ACTIONS ── */
    function openMessage(id) {
      state.selected = id;
      const msg = state.messages.find(m => m.id === id);
      if (msg && msg.status === 'new') {
        msg.status = 'read';
        saveMessages();
      }
      renderAll();
    }

    function updateStatus(id, status) {
      const msg = state.messages.find(m => m.id === id);
      if (msg) { msg.status = status; saveMessages(); renderAll(); showToast('Status updated'); }
    }

    /* ── FILTER TABS ── */
    document.getElementById('filterTabs').addEventListener('click', e => {
      if (!e.target.dataset.filter) return;
      state.filter = e.target.dataset.filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      renderList();
    });

    /* ── SEARCH ── */
    document.getElementById('searchBox').addEventListener('input', function () {
      state.search = this.value.trim();
      renderList();
    });

    /* ── REFRESH ── */
    document.getElementById('refreshBtn').addEventListener('click', () => {
      const prev = state.messages.length;
      state.messages = loadMessages();
      const diff = state.messages.length - prev;
      renderAll();
      showToast(diff > 0 ? `${diff} new message${diff > 1 ? 's' : ''}!` : 'Up to date');
    });

    /* ── CLEAR ALL ── */
    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (!confirm('Delete ALL messages? This cannot be undone.')) return;
      state.messages = [];
      state.selected = null;
      saveMessages();
      renderAll();
      showToast('All messages cleared', 'var(--accent)');
    });

    /* ── POLL for new messages every 5s ── */
    setInterval(() => {
      const fresh = loadMessages();
      if (fresh.length !== state.messages.length) {
        state.messages = fresh;
        renderAll();
      }
    }, 5000);

    /* ── INIT ── */
    state.messages = loadMessages();
    renderAll();
  </script>
</body>
</html>
