<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluWave CMS Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#0b1c2d,#113b5c);color:white;min-height:100vh;padding:20px;}
h1{text-align:center;margin-bottom:20px;color:#00bfff;}
.container{max-width:1200px;margin:0 auto;}
.tabs{display:flex;gap:20px;margin-bottom:20px;justify-content:center;}
.tab{padding:10px 20px;background:#540251;border-radius:10px;cursor:pointer;transition:0.3s;}
.tab.active{background:#5c5cff;}
.tab:hover{background:#5c5cff;}
.section{display:none;}
.section.active{display:block;}
form{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:20px;}
input, select{padding:10px;border-radius:8px;border:none;width:calc(25% - 10px);}
button{padding:10px 15px;border:none;border-radius:10px;background:#00bfff;color:white;cursor:pointer;transition:0.3s;}
button:hover{background:#540251;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{padding:10px;border:1px solid #00bfff;text-align:center;}
th{background:#540251;}
.btn-action{padding:5px 10px;border-radius:5px;margin:0 2px;}
.paid{background:green;color:white;}
.pending{background:orange;color:white;}
.message-card {
    background: black;
    padding: 15px;
    margin-bottom: 15px;
    border-left: 4px solid #0044ff;
    border-radius: 8px;
}
.message-card button {
    margin-top: 10px;
    padding: 6px 12px;
    background: #ef4444;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s ease;
}

.message-card button:hover {
    background: #b91c1c;
}
#body {
  display: none;
}
</style>
</head>
<body>

<section id="body">
  <div class="container">
  <h1>BluWave CMS Dashboard</h1>

  <div class="tabs">
    <div class="tab active" data-tab="clients">Clients</div>
    <div class="tab" data-tab="projects">Projects</div>
    <div class="tab" data-tab="payments">Payments</div>
    <div class="tab" data-tab="stats">Stats</div>
  </div>

  <!-- Clients Section -->
  <div class="section active" id="clients">
    <form id="clientForm">
      <input type="text" id="clientName" placeholder="Client Name" required>
      <input type="email" id="clientEmail" placeholder="Client Email" required>
      <input type="text" id="clientCompany" placeholder="Company" required>
      <input type="text" id="clientReferral" placeholder="Referred by (optional)">
      <button type="submit">Add Client</button>
    </form>
    <table id="clientTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Company</th>
          <th>Referred By</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Projects Section -->
  <div class="section" id="projects">
    <form id="projectForm">
      <select id="projectClient" required></select>
      <input type="text" id="projectName" placeholder="Project Name" required>
      <button type="submit">Add Project</button>
    </form>
    <table id="projectTable">
      <thead>
        <tr>
          <th>Client</th>
          <th>Project</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Payments Section -->
  <div class="section" id="payments">
    <table id="paymentTable">
      <thead>
        <tr>
          <th>Client</th>
          <th>Project</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Stats Section -->
  <div class="section" id="stats">
    <p>Total Clients: <span id="totalClients">0</span></p>
    <p>Total Projects: <span id="totalProjects">0</span></p>
    <p>Total Paid Projects: <span id="totalPaid">0</span></p>
    <p>Total Referred Clients: <span id="totalReferred">0</span></p>
  </div>

  <section class="messages-section">
    <h2>Incoming Messages</h2>
    <div id="messagesList"></div>
</section>
</div>
</section>

<input type="password" name="password" id="password" placeholder="Enter the Admin PassWord">
<button id="submit">Submit PassWord</button>

<script>

let passWord = document.getElementById('password');
let Button = document.getElementById('submit')
Button.addEventListener('click', function authenticate() {
  if (passWord.value === '1234') {
    document.getElementById('body').style.display = 'block'
    passWord.style.display = 'none'
    Button.style.display = 'none'
  } else {
    alert('Incorrect PassWord! Try again')
  }
})


// ----- Tabs -----
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

// ----- LocalStorage Data -----
let clients = JSON.parse(localStorage.getItem('clients')) || [];
let projects = JSON.parse(localStorage.getItem('projects')) || [];

// ----- Update Functions -----
function updateClients(){
  const tbody = document.querySelector('#clientTable tbody');
  tbody.innerHTML = '';
  clients.forEach((c,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${c.name}</td>
        <td>${c.email}</td>
        <td>${c.company}</td>
        <td>${c.referral || '-'}</td>
        <td><button class="btn-action" onclick="deleteClient(${i})">Delete</button></td>
      </tr>`;
  });
  updateClientDropdown();
  updateStats();
}

function updateClientDropdown(){
  const select = document.getElementById('projectClient');
  select.innerHTML = '<option value="">Select Client</option>';
  clients.forEach((c,i)=>{
    select.innerHTML += `<option value="${i}">${c.name}</option>`;
  });
}

function updateProjects(){
  const tbody = document.querySelector('#projectTable tbody');
  const paymentBody = document.querySelector('#paymentTable tbody');
  tbody.innerHTML = '';
  paymentBody.innerHTML = '';
  projects.forEach((p,i)=>{
    const clientName = clients[p.client] ? clients[p.client].name : 'Unknown';
    tbody.innerHTML += `
      <tr>
        <td>${clientName}</td>
        <td>${p.name}</td>
        <td><button class="btn-action" onclick="deleteProject(${i})">Delete</button></td>
      </tr>`;
    paymentBody.innerHTML += `
      <tr>
        <td>${clientName}</td>
        <td>${p.name}</td>
        <td><button class="btn-action ${p.status==='Paid'?'paid':'pending'}" onclick="togglePayment(${i})">${p.status}</button></td>
        <td></td>
      </tr>`;
  });
  updateStats();
}

function updateStats(){
  document.getElementById('totalClients').textContent = clients.length;
  document.getElementById('totalProjects').textContent = projects.length;
  const paid = projects.filter(p=>p.status==='Paid').length;
  document.getElementById('totalPaid').textContent = paid;
  const totalReferred = clients.filter(c=>c.referral && c.referral.trim()!=='').length;
  document.getElementById('totalReferred').textContent = totalReferred;
}

// ----- CRUD Functions -----
document.getElementById('clientForm').addEventListener('submit',e=>{
  e.preventDefault();
  const name = document.getElementById('clientName').value.trim();
  const email = document.getElementById('clientEmail').value.trim();
  const company = document.getElementById('clientCompany').value.trim();
  const referral = document.getElementById('clientReferral').value.trim();
  if(!name || !email || !company) return;
  clients.push({name,email,company,referral});
  localStorage.setItem('clients',JSON.stringify(clients));
  document.getElementById('clientForm').reset();
  updateClients();
});

function deleteClient(i){
  clients.splice(i,1);
  localStorage.setItem('clients',JSON.stringify(clients));
  projects = projects.filter(p=>p.client!=i);
  localStorage.setItem('projects',JSON.stringify(projects));
  updateClients();
  updateProjects();
}

document.getElementById('projectForm').addEventListener('submit',e=>{
  e.preventDefault();
  const clientIndex = document.getElementById('projectClient').value;
  const projectName = document.getElementById('projectName').value.trim();
  if(clientIndex === '' || !projectName) return;
  projects.push({client:clientIndex,name:projectName,status:'Pending'});
  localStorage.setItem('projects',JSON.stringify(projects));
  document.getElementById('projectForm').reset();
  updateProjects();
});

function deleteProject(i){
  projects.splice(i,1);
  localStorage.setItem('projects',JSON.stringify(projects));
  updateProjects();
}

function togglePayment(i){
  projects[i].status = projects[i].status==='Paid'?'Pending':'Paid';
  localStorage.setItem('projects',JSON.stringify(projects));
  updateProjects();
}

// ----- Referral Form Integration -----
// Example: if you have a referral form elsewhere that pushes to LocalStorage
function addReferral(name,email,company,referral){
  clients.push({name,email,company,referral});
  localStorage.setItem('clients',JSON.stringify(clients));
  updateClients();
}

// ----- Initial Load -----
updateClients();
updateProjects();
document.addEventListener("DOMContentLoaded", function () {

    function loadMessages() {
        const messagesList = document.getElementById("messagesList");
        const messages = JSON.parse(localStorage.getItem("bluwaveMessages")) || [];

        messagesList.innerHTML = "";

        messages.forEach(msg => {
            messagesList.innerHTML += `
                <div class="message-card">
                    <h4>${msg.name}</h4>
                    <p><strong>Email:</strong> ${msg.email}</p>
                    <p>${msg.message}</p>
                    <small>${msg.date}</small>
                    <button onclick="deleteMessage(${msg.id})">Delete</button>
                </div>
            `;
        });
    }

    window.deleteMessage = function(id) {
        let messages = JSON.parse(localStorage.getItem("bluwaveMessages")) || [];

        // Remove the selected message
        messages = messages.filter(msg => msg.id !== id);

        localStorage.setItem("bluwaveMessages", JSON.stringify(messages));

        loadMessages(); // Refresh UI
    };

    loadMessages();
});
</script>

</body>
</html>
